name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir dist
          cp index.html about.html services.html contact.html gallery.html reviews.html admin.html robots.txt sitemap.xml dist/
          cp -r css js assets dist/

      - name: Create Pages project if missing
        run: npx wrangler@4 pages project create yshandymen --production-branch=main || true

      - name: Deploy
        run: npx wrangler@4 pages deploy dist --project-name=yshandymen --branch=main --commit-hash=${{ github.sha }} --commit-dirty=true
